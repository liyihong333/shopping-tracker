<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>购物统计</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header-title" id="page-title">存量</h1>
      <p class="header-subtitle" id="page-subtitle">按分类查看物品</p>
    </header>

    <main class="main" id="main-content"></main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-btn active" data-page="inventory" aria-label="存量">
        <span class="nav-icon">📦</span>
        <span class="nav-label">存量</span>
      </button>
      <button class="nav-btn" data-page="record" aria-label="记录">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">记录</span>
      </button>
      <button class="nav-btn" data-page="stats" aria-label="统计">
        <span class="nav-icon">📊</span>
        <span class="nav-label">统计</span>
      </button>
    </nav>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
