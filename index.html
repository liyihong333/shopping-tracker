<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1c1917" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>购物统计</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="ambient-orb ambient-orb--1"></div>
    <div class="ambient-orb ambient-orb--2"></div>
  </div>

  <div id="app">
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <span class="header-mark">ST</span>
          <span class="header-eyebrow">Shopping Tracker</span>
        </div>
        <div class="header-date" id="header-date"></div>
      </div>
      <h1 class="header-title" id="page-title">存量</h1>
      <p class="header-subtitle" id="page-subtitle">按分类查看物品</p>
    </header>

    <main class="main" id="main-content"></main>

    <nav class="bottom-nav" aria-label="主导航">
      <div class="bottom-nav-inner">
        <button class="nav-btn active" data-page="inventory" aria-label="存量">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </span>
          <span class="nav-label">存量</span>
        </button>
        <button class="nav-btn" data-page="record" aria-label="记录">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </span>
          <span class="nav-label">记录</span>
        </button>
        <button class="nav-btn" data-page="stats" aria-label="统计">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </span>
          <span class="nav-label">统计</span>
        </button>
      </div>
    </nav>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
